name: Live iOS App Store Screenshots

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why a fresh live submission set is needed
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-live-app-store-screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture live Release runtime on a 6.5-inch simulator
    runs-on: macos-26
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run the complete unsigned iOS gate
        run: ./scripts/run-ios-gate.sh

      - name: Capture live Release App Store screenshots
        id: live_capture
        run: ./scripts/generate-ios-app-store-screenshots.sh

      - name: Upload live screenshots and provenance for human review
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-app-store-live-screenshots-${{ github.sha }}
          path: |
            build/app-store-live-screenshots/*.jpg
            build/app-store-live-screenshots/manifest.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload failed live-capture diagnostics
        if: failure() && steps.live_capture.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-app-store-screenshot-diagnostics-${{ github.sha }}
          path: build/ios-screenshot-diagnostics
          if-no-files-found: error
          retention-days: 7
