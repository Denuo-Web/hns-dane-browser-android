name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: Change scope and repository policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      rust: ${{ steps.targets.outputs.rust }}
      android: ${{ steps.targets.outputs.android }}
      ios: ${{ steps.targets.outputs.ios }}
    steps:
      - name: Check out repository and comparison history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select affected CI targets
        id: targets
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BEFORE_SHA: ${{ github.event.before }}
          CI_CURRENT_SHA: ${{ github.sha }}
          CI_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/ci-changed-targets.sh

      - name: Install pinned Rust toolchain for metadata policy
        run: rustup toolchain install 1.92.0 --profile minimal

      - name: Verify repository policy and release metadata
        run: |
          python3 -m unittest -v tests/test_ci_changed_targets.py
          ./scripts/verify-supply-chain.sh
          python3 ./scripts/generate-third-party-notices.py --check
          ./scripts/check-version-consistency.sh

  rust:
    name: Rust and supply chain
    needs: scope
    if: ${{ needs.scope.outputs.rust == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.92.0

      - name: Install pinned cargo-deny
        run: cargo +1.92.0 install cargo-deny --version 0.19.9 --locked

      - name: Run Rust, fuzz, tool, and supply-chain checks
        run: ./scripts/check.sh

  android:
    name: Android build and unit tests
    needs: scope
    if: ${{ needs.scope.outputs.android == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install pinned Rust Android tools
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
          rustup target add --toolchain 1.92.0 aarch64-linux-android x86_64-linux-android
          cargo +1.92.0 install cargo-ndk --version 4.1.2 --locked

      - name: Install pinned Android SDK components
        run: |
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-37.0" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358"

      - name: Verify pinned build inputs
        run: ./scripts/verify-supply-chain.sh

      - name: Verify shared runtime boundaries
        run: ./scripts/check-runtime-boundaries.sh

      - name: Build and test Android variants
        working-directory: android
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/28.2.13676358
          HNS_ANDROID_NDK_VERSION: 28.2.13676358
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug verifyReleaseBundleStructure --no-daemon --stacktrace

  ios:
    name: Apple ABI, XCFramework, and iOS shell
    needs: scope
    if: ${{ needs.scope.outputs.ios == 'true' }}
    runs-on: macos-26
    # Three release-mode Rust slices plus simulator XCTest and a device-slice
    # Release link routinely exceed the old one-hour budget on the standard
    # 3-core hosted runner even when every command is making progress.
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run the complete iOS gate
        run: ./scripts/run-ios-gate.sh

  required:
    name: Required CI
    needs: [scope, rust, android, ios]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify every selected target passed
        env:
          SCOPE_RESULT: ${{ needs.scope.result }}
          RUST_REQUIRED: ${{ needs.scope.outputs.rust }}
          RUST_RESULT: ${{ needs.rust.result }}
          ANDROID_REQUIRED: ${{ needs.scope.outputs.android }}
          ANDROID_RESULT: ${{ needs.android.result }}
          IOS_REQUIRED: ${{ needs.scope.outputs.ios }}
          IOS_RESULT: ${{ needs.ios.result }}
        run: |
          set -euo pipefail
          failed=0

          if [[ "$SCOPE_RESULT" != "success" ]]; then
            echo "::error::Change scope and repository policy finished with $SCOPE_RESULT."
            failed=1
          fi

          check_target() {
            local name="$1"
            local required="$2"
            local result="$3"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::$name finished with $result."
              failed=1
            elif [[ "$required" == "true" && "$result" != "success" ]]; then
              echo "::error::$name was required but finished with $result."
              failed=1
            fi
          }

          check_target "Rust" "$RUST_REQUIRED" "$RUST_RESULT"
          check_target "Android" "$ANDROID_REQUIRED" "$ANDROID_RESULT"
          check_target "iOS" "$IOS_REQUIRED" "$IOS_RESULT"
          exit "$failed"
