name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust and supply chain
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component rustfmt clippy
          rustup default 1.92.0

      - name: Install pinned cargo-deny
        run: cargo +1.92.0 install cargo-deny --version 0.19.9 --locked

      - name: Run Rust, fuzz, tool, and supply-chain checks
        run: ./scripts/check.sh

  android:
    name: Android build and unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install pinned Rust Android tools
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
          rustup target add --toolchain 1.92.0 aarch64-linux-android x86_64-linux-android
          cargo +1.92.0 install cargo-ndk --version 4.1.2 --locked

      - name: Install pinned Android SDK components
        run: |
          sdkmanager "platforms;android-37" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Verify pinned build inputs
        run: ./scripts/verify-supply-chain.sh

      - name: Build and test Android variants
        working-directory: android
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/28.2.13676358
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/28.2.13676358
          HNS_ANDROID_NDK_VERSION: 28.2.13676358
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug verifyReleaseBundleStructure --no-daemon --stacktrace

  ios:
    name: Apple ABI, XCFramework, and iOS shell
    runs-on: macos-26
    # Three release-mode Rust slices plus simulator XCTest and a device-slice
    # Release link routinely exceed the old one-hour budget on the standard
    # 3-core hosted runner even when every command is making progress.
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Lock and report the selected Xcode
        run: |
          developer_dir="$(xcode-select --print-path)"
          test -x "$developer_dir/usr/bin/xcodebuild"
          printf '%s\n' \
            "DEVELOPER_DIR=$developer_dir" \
            "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$developer_dir"
          xcodebuild -version
          xcode_version="$(xcodebuild -version | sed -n '1s/^Xcode //p')"
          case "$xcode_version" in
            26.5|26.5.*|26.6|26.6.*) ;;
            *)
              echo "ERROR: Xcode 26.5 or 26.6 is required; selected $xcode_version." >&2
              exit 1
              ;;
          esac
          iphoneos_sdk="$(xcrun --sdk iphoneos --show-sdk-version)"
          simulator_sdk="$(xcrun --sdk iphonesimulator --show-sdk-version)"
          printf 'iphoneos SDK %s\niphonesimulator SDK %s\n' \
            "$iphoneos_sdk" "$simulator_sdk"
          test "$iphoneos_sdk" = "26.5"
          test "$simulator_sdk" = "26.5"

      - name: Install pinned Rust toolchain and Apple targets
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component rustfmt clippy
          rustup default 1.92.0
          rustup target add --toolchain 1.92.0 \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Verify Apple adapter boundaries, selector, and host ABI
        run: |
          ./scripts/check-version-consistency.sh
          ./scripts/check-runtime-boundaries.sh
          python3 ./scripts/test_select_ios_simulator.py
          abi_target_dir="$(mktemp -d "$RUNNER_TEMP/hns-ios-abi.XXXXXX")"
          cleanup_abi_target() {
            rm -rf -- "$abi_target_dir"
          }
          trap cleanup_abi_target EXIT
          HNS_IOS_ABI_TARGET_DIR="$abi_target_dir" ./scripts/check-ios-abi.sh
          cleanup_abi_target
          trap - EXIT

      - name: Build XCFramework, run tests, and link the device app
        run: |
          simulator_id="$(
            xcrun simctl list devices available -j |
              python3 ./scripts/select_ios_simulator.py --runtime 26.5
          )"
          test -n "$simulator_id"
          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b
          HNS_RUST_IOS_CLEAN_TARGET=1 \
            HNS_IOS_ACTION=test \
            HNS_IOS_DESTINATION="platform=iOS Simulator,id=$simulator_id" \
            ./scripts/build-ios.sh
          HNS_IOS_REUSE_XCFRAMEWORK=1 \
            HNS_IOS_ACTION=build \
            HNS_IOS_CONFIGURATION=Release \
            HNS_IOS_DESTINATION="generic/platform=iOS" \
            ./scripts/build-ios.sh
