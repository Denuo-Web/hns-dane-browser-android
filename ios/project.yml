name: HnsDaneBrowser
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: 45NQQK3G3S
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "5.0"
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  HnsDaneBrowser:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HnsDaneBrowser
        excludes:
          - Support/Info.plist
          - Support/HnsDaneBrowser-Bridging-Header.h
      - path: ../android/app/src/main/assets/hns_headers_300000.snapshot.gzip
        type: file
        buildPhase: resources
      - path: ../android/app/src/main/assets/third_party_notices.txt
        type: file
        buildPhase: resources
    dependencies:
      - framework: ../build/apple/HnsBrowserRuntime.xcframework
        embed: false
        link: true
      - sdk: libz.tbd
    info:
      path: HnsDaneBrowser/Support/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.denuoweb.hnsdane.ios
        PRODUCT_MODULE_NAME: HnsDaneBrowser
        MARKETING_VERSION: 0.5.0
        CURRENT_PROJECT_VERSION: 41
        SWIFT_OBJC_BRIDGING_HEADER: HnsDaneBrowser/Support/HnsDaneBrowser-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../build/apple"
        OTHER_LDFLAGS: "$(inherited) -lz"
  HnsDaneBrowserTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HnsDaneBrowserTests
    dependencies:
      - target: HnsDaneBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.denuoweb.hnsdane.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HnsDaneBrowser.app/HnsDaneBrowser"
        BUNDLE_LOADER: "$(TEST_HOST)"
  HnsDaneBrowserScreenshotTests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HnsDaneBrowserScreenshotTests
    dependencies:
      - target: HnsDaneBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.denuoweb.hnsdane.ios.screenshottests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        TEST_TARGET_NAME: HnsDaneBrowser
schemes:
  HnsDaneBrowser:
    build:
      targets:
        HnsDaneBrowser: all
        HnsDaneBrowserTests: [test]
    test:
      targets:
        - HnsDaneBrowserTests
  HnsDaneBrowserScreenshots:
    build:
      parallelizeBuild: false
      targets:
        HnsDaneBrowser: all
        HnsDaneBrowserScreenshotTests: [test]
    test:
      targets:
        - HnsDaneBrowserScreenshotTests
