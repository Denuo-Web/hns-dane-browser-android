name: experimental-hns-p2p-dns-relay

x-harness: &harness
  image: ${PYTHON_IMAGE:-python:3.12-alpine}
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=16m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  environment: &common-environment
    ARTIFACT_DIR: /artifacts
    ORIGIN_CERT: /artifacts/origin-cert.pem
    ORIGIN_KEY: /artifacts/origin-key.pem
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
  volumes:
    - .:/harness:ro
    - ${ARTIFACT_DIR:?ARTIFACT_DIR must name an absolute host directory}:/artifacts

services:
  authoritative-dns:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "dns-auth"]
    cap_add: [NET_BIND_SERVICE]
    networks:
      dns-net:
        ipv4_address: 172.30.20.53
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/authoritative-dns.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  origin-server:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "origin"]
    cap_add: [NET_BIND_SERVICE]
    networks:
      origin-net:
        ipv4_address: 172.30.30.10
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/origin-server.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  third-party-sentinel:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "sentinel"]
    cap_add: [NET_BIND_SERVICE]
    networks:
      p2p-net:
        ipv4_address: 172.30.10.53
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/third-party-sentinel.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  hsd-proof:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "peer", "--role", "hsd-proof", "--port", "14038"]
    networks:
      p2p-net:
        ipv4_address: 172.30.10.11
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/hsd-proof.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  hsd-relay-good:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "peer", "--role", "hsd-relay-good", "--port", "14039"]
    environment:
      <<: *common-environment
      AUTH_DNS_IP: 172.30.20.53
      ORIGIN_IP: 172.30.30.10
      BACKEND_TIMEOUT: "3.0"
      # Disable refill in the scripted tier so burst exhaustion and the
      # one-notice-per-second suppression rule are deterministic under load.
      RELAY_RATE: "0"
      RELAY_BURST: "40"
      RELAY_PEER_INFLIGHT: "16"
      RELAY_GLOBAL_INFLIGHT: "32"
      RELAY_CACHE_LIMIT: "128"
      RELAY_PRESSURE_DELAY: "0.5"
      RELAY_PRESSURE_GATE_TIMEOUT: "5.0"
    depends_on:
      authoritative-dns:
        condition: service_healthy
    networks:
      p2p-net:
        ipv4_address: 172.30.10.12
      dns-net:
        ipv4_address: 172.30.20.12
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/hsd-relay-good.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  hsd-relay-bad:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "peer", "--role", "hsd-relay-bad", "--port", "14040"]
    environment:
      <<: *common-environment
      BAD_RELAY_MODE: cycle
      BAD_TIMEOUT: "1.0"
    networks:
      p2p-net:
        ipv4_address: 172.30.10.13
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/hsd-relay-bad.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  hsd-legacy:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "peer", "--role", "hsd-legacy", "--port", "14041"]
    networks:
      p2p-net:
        ipv4_address: 172.30.10.14
    healthcheck:
      test: ["CMD-SHELL", "test -f /artifacts/hsd-legacy.ready"]
      interval: 250ms
      timeout: 1s
      retries: 80

  browser-test:
    <<: *harness
    command: ["python", "-u", "/harness/harness.py", "client"]
    environment:
      <<: *common-environment
      HARNESS_MODE: ${HARNESS_MODE:-e2e}
      PROOF_IP: 172.30.10.11
      GOOD_IP: 172.30.10.12
      BAD_IP: 172.30.10.13
      LEGACY_IP: 172.30.10.14
      AUTH_DNS_IP: 172.30.20.53
      ORIGIN_IP: 172.30.30.10
      EXTERNAL_DNS_PROBE: 1.1.1.1
    networks:
      p2p-net:
        ipv4_address: 172.30.10.50
      origin-net:
        ipv4_address: 172.30.30.50

networks:
  p2p-net:
    internal: true
    ipam:
      config:
        - subnet: 172.30.10.0/24
  dns-net:
    internal: true
    ipam:
      config:
        - subnet: 172.30.20.0/24
  origin-net:
    internal: true
    ipam:
      config:
        - subnet: 172.30.30.0/24
